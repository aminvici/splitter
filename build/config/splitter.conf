[global]
max_process = 1

[profiling]
enable = true
host = 0.0.0.0
port = 6062

[metric]
enable = false
host = 0.0.0.0
port = 6063
path = /metrics

[btc]
enable = true
database_enable = true
database_worker_buffer = 8192
database_worker_number = 1
max_batch_block = 30
endpoint = http://127.0.0.1:8332
user = [btc_rpc_user]
password = [btc_rpc_password]
json_schema_file = /etc/bds-splitter/schema/btc.json
json_schema_validation_enable = false

[cron.btc]
update_meta_expr = @every 1m

[kafka.btc]
enable = true
topic = btc
client_id = btc-client-1
group_id = btc-group
broker_list = localhost:9092
buffer_size = 1000
return_errors = true

[database.btc]
type = postgres
host = 127.0.0.1
port = 5432
database = splitter
user = splitter
password = 123456
timezone = Asia/Shanghai
max_open_conns = 500
max_idle_conns = 100
sql_log_file = /var/log/bds-splitter/btc-sql.log
debug = false

[xlm]
enable = true
database_enable = true
database_worker_buffer = 8192
database_worker_number = 20
skip_height = 0
skip_miss_block = false
max_batch_block = 1000
endpoint = 127.0.0.1:8080
json_schema_file = /etc/bds-splitter/schema/xlm.json
json_schema_validation_enable = false
concurrent_height = 22822347
concurrent_http = 5

[cron.xlm]
update_meta_expr = @every 1m

[kafka.xlm]
enable = true
topic = xlm
client_id = xlm-client-1
group_id = xlm-group
broker_list = localhost:9092
buffer_size = 1000
return_errors = true

[database.xlm]
type = postgres
host = 127.0.0.1
port = 5432
database = splitter
user = splitter
password = 123456
timezone = Asia/Shanghai
max_open_conns = 500
max_idle_conns = 100
sql_log_file = /var/log/bds-splitter/xlm-sql.log
debug = false

[xrp]
enable = true
database_enable = true
database_worker_buffer = 8192
database_worker_number = 20
max_batch_block = 1000
endpoint = http://127.0.0.1:5005
json_schema_file = /etc/bds-splitter/schema/xrp.json
json_schema_validation_enable = false

[cron.xrp]
update_meta_expr = @every 1m
get_batch_ledger_expr = @every 1m

[kafka.xrp]
enable = true
topic = xrp
client_id = xrp-client-1
group_id = xrp-group
broker_list = localhost:9092
buffer_size = 1000
return_errors = true

[database.xrp]
type = postgres
host = 127.0.0.1
port = 5432
database = splitter
user = splitter
password = 123456
timezone = Asia/Shanghai
max_open_conns = 500
max_idle_conns = 100
sql_log_file = /var/log/bds-splitter/xrp-sql.log
debug = false

[tron]
enable = true
database_enable = true
database_worker_buffer = 8192
database_worker_number = 1
concurrent_height = 12000000
max_batch_block = 1000
skip_miss_block = false
skip_height = 0
endpoint = http://127.0.0.1:8090
user = [tron_rpc_user]
password = [tron_rpc_password]
json_schema_file = /etc/bds-splitter/schema/tron.json
json_schema_validation_enable = false

[cron.tron]
update_meta_expr = @every 1m

[kafka.tron]
enable = true
topic = trx
client_id = tron-client-1
group_id = tron-group
broker_list = localhost:9092
buffer_size = 1000
return_errors = true

[database.tron]
type = postgres
host = 127.0.0.1
port = 5432
database = splitter
user = splitter
password = 123456
timezone = Asia/Shanghai
max_open_conns = 500
max_idle_conns = 100
sql_log_file = /var/log/bds-splitter/tron-sql.log
debug = false

[logging_normal]
writers = console,file
log_file = /var/log/bds-splitter/normal.log
log_level = debug
caller_level_skip = 5
format = short
max_size = 100m
daily = true

[logging_detail]
writers = console,file
log_file = /var/log/bds-splitter/detail.log
log_level = debug
caller_level_skip = 5
format = long
max_size = 100m
daily = true
